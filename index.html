<script>


// Team Bubble Click
document.querySelectorAll(".bubble").forEach(function(team){

team.addEventListener("click", function(){

let teamName = this.getAttribute("data-team");

if(teamName){
alert("You clicked: " + teamName);
}

});

});


// Search Box Function
document.getElementById("searchInput").addEventListener("keyup", function(){

let value = this.value.toLowerCase();

document.querySelectorAll(".team-bubbles .bubble").forEach(function(team){

let name = team.getAttribute("data-team");

if(name && name.toLowerCase().includes(value)){
team.style.display = "inline-block";
}
else{
team.style.display = "none";
}

});

});

</script>
